# quant-nginx.conf
#
# 企业级 Nginx 配置文件，用于生产环境部署 AlphaScan AI 系统。
# 负责流量分发、HTTPS 强制、安全头、缓存控制和协议升级。

# --- 上游服务定义 ---
upstream nextjs_frontend {
    # Next.js 服务运行的地址和端口 (SSR 模式)
    server 127.0.0.1:9002; 
}

upstream nodejs_api {
    # Node.js API 网关运行的地址和端口
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name your_domain.com; # 替换为您的域名

    # 强制将所有 HTTP 请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your_domain.com; # 替换为您的域名

    # --- SSL/TLS 配置 ---
    # 在生产环境中，请使用由权威 CA 签发的证书
    ssl_certificate /etc/nginx/ssl/your_domain.com.crt; # 证书路径
    ssl_certificate_key /etc/nginx/ssl/your_domain.com.key; # 私钥路径
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";

    # --- 安全头配置 ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Gzip 压缩 ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- 核心路由规则 ---
    
    # API 路由: 将所有 /api/v1/ 的请求反向代理到 Node.js API 网关
    location /api/v1/ {
        proxy_pass http://nodejs_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 前端路由: 将所有其他请求反向代理到 Next.js 前端应用
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # --- PWA Service Worker 缓存策略 ---
    # 确保浏览器总是获取最新的 Service Worker 文件，避免缓存问题
    location = /sw.js {
        add_header Cache-Control "no-cache";
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
        expires off;
        access_log off;
        proxy_pass http://nextjs_frontend;
    }

    # --- 大文件上传与 WebSocket 支持 ---
    # 预留配置，为未来可能的数据导入功能（如 CSV 上传）做准备
    client_max_body_size 100M; # 允许最大上传 100MB 的文件

    # 如果未来需要引入 WebSocket 用于实时消息推送 (例如任务状态更新)
    # 上面的 /api/v1/ 路由配置已包含必要的 proxy_set_header 用于协议升级
}
